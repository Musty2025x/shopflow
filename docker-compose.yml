# ═══════════════════════════════════════════════════════════════
# ShopFlow — Docker Compose
# Services:  app (Node.js) · nginx (reverse proxy)
# Database:  AWS RDS MySQL (external — not containerised)
# ═══════════════════════════════════════════════════════════════
services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: shopflow:latest
    container_name: shopflow_app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 5000
    expose:
      - "5000"
    volumes:
      - app_logs:/app/backend/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - shopflow_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:1.25-alpine
    container_name: shopflow_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - shopflow_net

  logs:
    image: amir20/dozzle:latest
    container_name: shopflow_logs
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - shopflow_net

networks:
  shopflow_net:
    driver: bridge

volumes:
  app_logs:
  nginx_logs: