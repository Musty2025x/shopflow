user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json escape=json
        '{"time":"$time_iso8601","ip":"$remote_addr","method":"$request_method",'
        '"uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,'
        '"duration":$request_time,"ua":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml text/javascript;
    client_max_body_size 10M;

    upstream shopflow_app {
        server app:5000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Health check (bypass rate limit)
        location /health {
            access_log off;
            proxy_pass http://shopflow_app;
        }

        # API — proxy to Node.js
        location /api/ {
            proxy_pass         http://shopflow_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }

        # Frontend — proxy to Node.js static serving
        location / {
            proxy_pass         http://shopflow_app;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error":"Service temporarily unavailable"}';
            add_header Content-Type application/json;
        }
    }
}
